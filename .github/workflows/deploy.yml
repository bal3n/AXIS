name: Deploy Axis Robotics Updates

on:
  workflow_dispatch:
  schedule:
    # Refresh every day at 8:30am UTC. Increase frequency if demos change often.
    - cron: '30 8 * * *'
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify NOTION_TOKEN secret
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "::error::Missing NOTION_TOKEN. Add it in Settings → Secrets and variables → Actions → Secrets."
            exit 1
          fi
      - name: Ingest Notion
        run: npm run ingest
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ROBOTICS_ROOT_PAGE_ID: 35c68db0a61c80fcade6c0b5e9ae0633
          NOTION_MENGFEI_PAGE_ID: 2df68db0a61c80c2b820ec5706e5750b
          NOTION_YIKAI_PAGE_ID: 30168db0a61c80a690e8cb41c24ade6b
          UPDATE_YEAR: '2026'
          NOTION_DOWNLOAD_MEDIA: true
      - name: Build static site
        run: npm run build
        env:
          NEXT_OUTPUT_EXPORT: true
          NEXT_PUBLIC_BASE_PATH: /AXIS
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
